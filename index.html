<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SonoLearn — POCUS Training</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="app-header">
    <button class="btn-back" id="btn-back" style="display:none">‹</button>
    <h1 id="header-title">SonoLearn</h1>
  </header>

  <!-- ── Home screen ─────────────────────────────────────── -->
  <div id="home-screen">
    <p class="home-title">SonoLearn</p>
    <p class="home-subtitle">Point-of-care ultrasound anatomy training</p>
    <div id="quiz-list"></div>
  </div>

  <!-- ── Quiz screen ─────────────────────────────────────── -->
  <div id="quiz-screen" style="display:none">
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <p class="question-counter" id="question-counter">QUESTION 1 OF 1</p>

    <!-- Image -->
    <div class="image-wrap" id="image-wrap">
      <img class="us-image" id="us-image" src="" alt="Ultrasound image" draggable="false" />
      <img class="overlay-img" id="overlay-img" src="" alt="Labeled anatomy" draggable="false" />

      <!-- Canvas for drawn labels -->
      <canvas id="label-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:0;transition:opacity .35s;"></canvas>

      <!-- Crosshair -->
      <div class="crosshair" id="crosshair">
        <div class="crosshair-dot" id="crosshair-dot"></div>
      </div>

      <!-- Target hint circle -->
      <div class="target-hint" id="target-hint"></div>
    </div>

    <!-- Question -->
    <p class="question-text" id="question-text">Click on the structure</p>

    <!-- Answer feedback -->
    <div class="answer-panel" id="answer-panel">
      <p class="answer-status" id="answer-status"></p>
      <p class="answer-explanation" id="answer-explanation"></p>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-primary" id="confirm-btn" disabled>CONFIRM</button>
      <button class="btn-primary next-btn" id="next-btn" style="display:none">NEXT</button>
    </div>
  </div>

  <!-- ── Result screen ────────────────────────────────────── -->
  <div id="result-screen" style="display:none">
    <div class="result-score" id="result-score">0%</div>
    <p class="result-label">FINAL SCORE</p>
    <p class="result-title" id="result-title">Good job!</p>
    <p class="result-sub" id="result-sub"></p>
    <div class="result-actions">
      <button class="btn-primary next-btn" id="btn-retry">Try Again</button>
      <button class="btn-outline" id="btn-home">Back to Home</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
